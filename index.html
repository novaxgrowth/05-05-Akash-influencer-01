<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Telegram Channel | Join Our Community</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #f7f9fc 0%, #eef2f5 100%);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* main card / landing container */
    .landing-card {
      max-width: 560px;
      width: 100%;
      background: rgba(255, 255, 255, 0.96);
      border-radius: 64px;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 8px 18px rgba(0, 0, 0, 0.05);
      padding: 2rem 2rem 3rem;
      text-align: center;
      transition: all 0.2s ease;
      border: 1px solid rgba(255,255,255,0.5);
    }

    /* circular image wrapper */
    .image-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 1.8rem;
    }

    .circular-img {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.2), 0 0 0 4px white, 0 0 0 8px rgba(0, 122, 204, 0.2);
      transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      background: #f0f2f5;
    }

    .circular-img:hover {
      transform: scale(1.02);
    }

    /* channel name text section (between image and button) */
    .channel-text-section {
      margin: 1.6rem 0 2.2rem;
      padding: 0 0.5rem;
    }

    .channel-label {
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #5a6874;
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    .channel-name {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #1e2a3a, #0f2b38);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.01em;
      word-break: break-word;
      display: inline-block;
      border-bottom: 3px dotted #a0c4e2;
      padding-bottom: 0.2rem;
    }

    /* telegram button */
    .telegram-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #2AABEE;
      color: white;
      font-size: 1.25rem;
      font-weight: 600;
      padding: 1rem 2.2rem;
      border: none;
      border-radius: 60px;
      cursor: pointer;
      box-shadow: 0 12px 18px -8px rgba(42, 171, 238, 0.4);
      transition: all 0.25s ease;
      font-family: inherit;
      letter-spacing: 0.3px;
      text-decoration: none;
      width: auto;
      min-width: 240px;
    }

    .telegram-btn:hover {
      background: #1f9bd9;
      transform: translateY(-3px);
      box-shadow: 0 20px 24px -10px rgba(42, 171, 238, 0.5);
    }

    .telegram-btn:active {
      transform: translateY(2px);
      box-shadow: 0 8px 14px -6px rgba(42, 171, 238, 0.5);
    }

    /* optional footer / join info */
    .join-hint {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #6c7a89;
      background: #f0f4f9;
      display: inline-block;
      padding: 0.4rem 1rem;
      border-radius: 30px;
    }

    /* responsive */
    @media (max-width: 480px) {
      .landing-card {
        padding: 1.8rem 1.5rem 2.5rem;
      }
      .circular-img {
        width: 140px;
        height: 140px;
      }
      .channel-name {
        font-size: 1.7rem;
      }
      .telegram-btn {
        font-size: 1rem;
        padding: 0.8rem 1.6rem;
        min-width: 200px;
      }
    }

    /* animated fade in */
    @keyframes fadeSlideUp {
      0% {
        opacity: 0;
        transform: translateY(18px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .landing-card > * {
      animation: fadeSlideUp 0.5s ease forwards;
      opacity: 0;
    }

    .image-wrapper {
      animation-delay: 0.05s;
    }
    .channel-text-section {
      animation-delay: 0.2s;
    }
    .telegram-btn {
      animation-delay: 0.35s;
    }
    .join-hint {
      animation-delay: 0.45s;
    }
  </style>
</head>
<body>
  <div class="landing-card">
    <!-- 1) Circular image section -->
    <div class="image-wrapper">
      <img class="circular-img" 
           src="https://adgrowth7.xyz/wp-content/uploads/2026/05/WhatsApp-Image-2026-05-05-at-6.28.11-AM.jpeg" 
           alt="Channel Avatar - circular profile"
           onerror="this.src="https://adgrowth7.xyz/wp-content/uploads/2026/05/WhatsApp-Image-2026-05-05-at-6.28.11-AM.jpeg">
    </div>

    <!-- 2) Text section: channel name written between image and button -->
    <div class="channel-text-section">
      <div class="channel-label">📢 OFFICIAL TELEGRAM</div>
      <h1 class="channel-name">Crypto Pulse Daily</h1>
    </div>

    <!-- 3) Telegram Join Button (below the text) - using anchor tag for direct link -->
    <a href="https://t.me/joinchat/YourChannelLink" 
       class="telegram-btn" 
       target="_blank" 
       rel="noopener noreferrer">
      <!-- Telegram SVG icon -->
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.6-1.38-.97-2.23-1.56-.99-.68-.35-1.06.22-1.67.15-.15 2.71-2.48 2.76-2.69.01-.03.02-.14-.06-.2-.08-.06-.19-.04-.27-.02-.11.03-1.84 1.17-5.2 3.44-.49.34-.94.5-1.34.49-.44-.01-1.29-.25-1.92-.45-.77-.25-1.38-.38-1.33-.8.03-.22.33-.45.91-.68 3.58-1.56 5.97-2.59 7.17-3.08 3.41-1.4 4.12-1.64 4.58-1.65.1 0 .33.02.48.15.12.1.15.24.17.38-.01.09 0 .16-.01.24z" fill="white"/>
      </svg>
      <span>Join Telegram Channel</span>
    </a>

    <!-- small extra hint for user -->
    <div class="join-hint">
      ⚡ Stay updated — no spam, only valuable insights
    </div>
  </div>
</body>
</html>
