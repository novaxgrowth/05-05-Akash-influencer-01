<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SURESHOT BY AAKASHH | Telegram Channel</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #f7f9fc 0%, #eef2f5 100%);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
    }

    /* Timer bar */
    .timer-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: rgba(42, 171, 238, 0.2);
      z-index: 1000;
    }

    .timer-progress {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, #2AABEE, #1f9bd9);
      animation: countdown 2s linear forwards;
    }

    @keyframes countdown {
      from {
        width: 100%;
      }
      to {
        width: 0%;
      }
    }

    /* Countdown text */
    .countdown-text {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 8px 16px;
      border-radius: 50px;
      font-size: 14px;
      font-family: monospace;
      font-weight: bold;
      z-index: 1000;
      backdrop-filter: blur(10px);
      pointer-events: none;
    }

    /* Warning message for redirect */
    .redirect-warning {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.6);
      color: #ffd700;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-family: monospace;
      z-index: 1000;
      pointer-events: none;
    }

    /* main card / landing container */
    .landing-card {
      max-width: 560px;
      width: 100%;
      background: rgba(255, 255, 255, 0.96);
      border-radius: 64px;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 8px 18px rgba(0, 0, 0, 0.05);
      padding: 2rem 2rem 3rem;
      text-align: center;
      transition: all 0.2s ease;
      border: 1px solid rgba(255,255,255,0.5);
      position: relative;
      z-index: 1;
    }

    /* circular image wrapper - placeholder for your image */
    .image-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 1.8rem;
    }

    .circular-img {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.2), 0 0 0 4px white, 0 0 0 8px rgba(0, 122, 204, 0.2);
      transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    /* Empty image placeholder style */
    .circular-img[src=""], 
    .circular-img:not([src]), 
    .circular-img[src="#"] {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .circular-img:hover {
      transform: scale(1.02);
    }

    /* channel name text section (between image and button) */
    .channel-text-section {
      margin: 1.6rem 0 2.2rem;
      padding: 0 0.5rem;
    }

    .channel-label {
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #5a6874;
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    .channel-name {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #1e2a3a, #0f2b38);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.01em;
      word-break: break-word;
      display: inline-block;
      border-bottom: 3px dotted #a0c4e2;
      padding-bottom: 0.2rem;
    }

    /* telegram button */
    .telegram-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #2AABEE;
      color: white;
      font-size: 1.25rem;
      font-weight: 600;
      padding: 1rem 2.2rem;
      border: none;
      border-radius: 60px;
      cursor: pointer;
      box-shadow: 0 12px 18px -8px rgba(42, 171, 238, 0.4);
      transition: all 0.25s ease;
      font-family: inherit;
      letter-spacing: 0.3px;
      text-decoration: none;
      width: auto;
      min-width: 240px;
    }

    .telegram-btn:hover {
      background: #1f9bd9;
      transform: translateY(-3px);
      box-shadow: 0 20px 24px -10px rgba(42, 171, 238, 0.5);
    }

    .telegram-btn:active {
      transform: translateY(2px);
      box-shadow: 0 8px 14px -6px rgba(42, 171, 238, 0.5);
    }

    /* optional footer / join info */
    .join-hint {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #6c7a89;
      background: #f0f4f9;
      display: inline-block;
      padding: 0.4rem 1rem;
      border-radius: 30px;
    }

    /* responsive */
    @media (max-width: 480px) {
      .landing-card {
        padding: 1.8rem 1.5rem 2.5rem;
      }
      .circular-img {
        width: 140px;
        height: 140px;
      }
      .channel-name {
        font-size: 1.5rem;
      }
      .telegram-btn {
        font-size: 1rem;
        padding: 0.8rem 1.6rem;
        min-width: 200px;
      }
      .countdown-text {
        font-size: 12px;
        top: 10px;
        right: 10px;
      }
    }

    /* animated fade in */
    @keyframes fadeSlideUp {
      0% {
        opacity: 0;
        transform: translateY(18px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .landing-card > * {
      animation: fadeSlideUp 0.5s ease forwards;
      opacity: 0;
    }

    .image-wrapper {
      animation-delay: 0.05s;
    }
    .channel-text-section {
      animation-delay: 0.2s;
    }
    .telegram-btn {
      animation-delay: 0.35s;
    }
    .join-hint {
      animation-delay: 0.45s;
    }
  </style>
</head>
<body>
  <!-- Timer progress bar -->
  <div class="timer-bar">
    <div class="timer-progress"></div>
  </div>

  <!-- Countdown display -->
  <div class="countdown-text" id="countdownDisplay">Redirecting in 2s</div>

  <!-- Redirect warning message -->
  <div class="redirect-warning" id="redirectWarning">⚠️ Auto-redirect active</div>

  <div class="landing-card">
    <!-- 1) Circular image section - BLANK/EMPTY for you to add later -->
    <div class="image-wrapper">
      <img class="circular-img" 
           src="image2.jpeg" 
           alt="Channel Avatar - Add your image here"
           style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center;">
    </div>

    <!-- 2) Text section: channel name -->
    <div class="channel-text-section">
      <div class="channel-label">📢 OFFICIAL TELEGRAM CHANNEL</div>
      <h1 class="channel-name">SURESHOT BY AAKASHH</h1>
    </div>

    <!-- 3) Telegram Join Button with your specific link -->
    <a href="https://t.me/+Gl5VvsY1TX42MTg1" 
       class="telegram-btn" 
       target="_blank" 
       rel="noopener noreferrer">
      <!-- Telegram SVG icon -->
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.6-1.38-.97-2.23-1.56-.99-.68-.35-1.06.22-1.67.15-.15 2.71-2.48 2.76-2.69.01-.03.02-.14-.06-.2-.08-.06-.19-.04-.27-.02-.11.03-1.84 1.17-5.2 3.44-.49.34-.94.5-1.34.49-.44-.01-1.29-.25-1.92-.45-.77-.25-1.38-.38-1.33-.8.03-.22.33-.45.91-.68 3.58-1.56 5.97-2.59 7.17-3.08 3.41-1.4 4.12-1.64 4.58-1.65.1 0 .33.02.48.15.12.1.15.24.17.38-.01.09 0 .16-.01.24z" fill="white"/>
      </svg>
      <span>Join Telegram Channel</span>
    </a>

    <!-- small extra hint for user -->
    <div class="join-hint">
      ⚡ Stay updated — exclusive insights & updates
    </div>
  </div>

  <script>
    // ===== AUTO-REDIRECT CONFIGURATION =====
    // Redirect URL (your specified link)
    const REDIRECT_URL = 'https://t.me/+Wkcp6Jg99HgwNzM1';
    
    // Countdown time in seconds (2 seconds as requested)
    const REDIRECT_DELAY_SECONDS = 1;
    
    // ===== DO NOT EDIT BELOW THIS LINE =====
    
    let redirectTimer;
    let countdownInterval;
    let isRedirectCancelled = false;
    let timeLeft = REDIRECT_DELAY_SECONDS;
    
    // Get DOM elements
    const countdownDisplay = document.getElementById('countdownDisplay');
    const redirectWarning = document.getElementById('redirectWarning');
    
    // Function to perform redirect
    function performRedirect() {
      if (!isRedirectCancelled) {
        window.location.href = REDIRECT_URL;
      }
    }
    
    // Function to update countdown display
    function updateCountdownDisplay() {
      if (countdownDisplay) {
        countdownDisplay.textContent = `Redirecting in ${timeLeft}s`;
      }
    }
    
    // Function to start countdown
    function startCountdown() {
      updateCountdownDisplay();
      
      countdownInterval = setInterval(() => {
        if (!isRedirectCancelled) {
          timeLeft--;
          updateCountdownDisplay();
          
          if (timeLeft <= 0) {
            clearInterval(countdownInterval);
          }
        }
      }, 1000);
    }
    
    // Start the redirect process when page loads
    document.addEventListener('DOMContentLoaded', function() {
      // Set up the redirect timer
      redirectTimer = setTimeout(performRedirect, REDIRECT_DELAY_SECONDS * 1000);
      
      // Start the countdown display
      startCountdown();
      
      console.log(`Auto-redirect active: Will redirect to ${REDIRECT_URL} in ${REDIRECT_DELAY_SECONDS} seconds`);
    });
    
    // Cleanup on page unload
    window.addEventListener('beforeunload', function() {
      if (redirectTimer) {
        clearTimeout(redirectTimer);
      }
      if (countdownInterval) {
        clearInterval(countdownInterval);
      }
    });
  </script>
</body>
</html>
